<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <desc>BrainFry App Icon Source File - Editable in Figma, Illustrator, and Sketch</desc>
  
  <!-- Background Layer -->
  <g id="Background">
    <rect width="1024" height="1024" rx="220" fill="#F5F5DC"/>
  </g>

  <!-- Brain Character -->
  <g id="BrainCharacter" transform="translate(192, 192)">
    <!-- Brain Shadow / Base -->
    <ellipse cx="320" cy="560" rx="240" ry="40" fill="#E2DCBF" opacity="0.8"/>
    
    <!-- Brain Body Fills & Shading -->
    <g id="Lobes">
      <!-- Main Lobe Back Shadow -->
      <path d="M 120 400 C 60 380, 40 280, 100 200 C 60 120, 140 40, 240 80 C 300 20, 420 20, 480 80 C 580 40, 660 120, 620 200 C 680 280, 660 380, 600 400 C 640 480, 520 560, 440 500 C 320 560, 200 560, 160 500 C 100 540, 60 480, 120 400 Z" fill="#E28991"/>
      
      <!-- Main Lobe Front Highlight -->
      <path d="M 130 390 C 75 370, 55 275, 110 200 C 75 125, 150 50, 245 90 C 300 35, 410 35, 465 90 C 560 50, 635 125, 600 200 C 655 275, 635 370, 580 390 C 615 465, 505 535, 430 480 C 320 535, 210 535, 175 480 C 115 520, 80 465, 130 390 Z" fill="#FF9AA2"/>
      
      <!-- Lobe details/wrinkles -->
      <path d="M 200 220 Q 240 180 300 220" stroke="#3C2A21" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M 440 220 Q 400 180 340 220" stroke="#3C2A21" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M 160 320 Q 240 300 280 360" stroke="#3C2A21" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M 480 320 Q 400 300 360 360" stroke="#3C2A21" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M 320 120 L 320 480" stroke="#3C2A21" stroke-width="20" stroke-linecap="round" fill="none"/>
    </g>
    
    <!-- Outer Outline -->
    <path d="M 130 390 C 75 370, 55 275, 110 200 C 75 125, 150 50, 245 90 C 300 35, 410 35, 465 90 C 560 50, 635 125, 600 200 C 655 275, 635 370, 580 390 C 615 465, 505 535, 430 480 C 320 535, 210 535, 175 480 C 115 520, 80 465, 130 390 Z" stroke="#3C2A21" stroke-width="20" stroke-linejoin="round" fill="none"/>

    <!-- Recovery / Protection Element: Melting Ice Cube -->
    <g id="IceCube" transform="translate(260, -10)">
      <!-- Ice Cube Shadow -->
      <ellipse cx="60" cy="110" rx="70" ry="15" fill="#3C2A21" opacity="0.15"/>
      <!-- Melted water puddle -->
      <path d="M -20 110 C -20 100, 140 100, 140 110 C 140 120, -20 120, -20 110 Z" fill="#B5EAD7" opacity="0.8"/>
      <!-- Main Ice Block -->
      <rect x="10" y="20" width="100" height="90" rx="20" fill="#D5F5E3" stroke="#3C2A21" stroke-width="16"/>
      <!-- Shine/Highlight -->
      <path d="M 30 40 L 30 70" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
      <!-- Melting drips -->
      <path d="M 50 110 Q 55 130 60 110" stroke="#3C2A21" stroke-width="12" fill="#B5EAD7"/>
      <path d="M 80 110 Q 83 125 86 110" stroke="#3C2A21" stroke-width="12" fill="#B5EAD7"/>
    </g>

    <!-- Face / Expression -->
    <g id="Face">
      <!-- Left Eye (Exhausted/Dazed Spiral-ish) -->
      <g id="LeftEye" transform="translate(200, 260)">
        <!-- Eye contour -->
        <circle cx="0" cy="0" r="45" fill="#FFFFFF" stroke="#3C2A21" stroke-width="16"/>
        <!-- Dizzy Spiral Pupil -->
        <path d="M -15 0 C -15 -20, 15 -20, 15 0 C 15 15, -5 15, -5 0 Q -5 -5 0 -5" stroke="#3C2A21" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Eyelid drooping -->
        <path d="M -45 -10 Q 0 -30 45 -10 L 45 -45 L -45 -45 Z" fill="#FF9AA2"/>
        <path d="M -45 -10 Q 0 -30 45 -10" stroke="#3C2A21" stroke-width="16" stroke-linecap="round"/>
      </g>
      
      <!-- Right Eye (Exhausted/Dazed Spiral-ish) -->
      <g id="RightEye" transform="translate(440, 260)">
        <!-- Eye contour -->
        <circle cx="0" cy="0" r="45" fill="#FFFFFF" stroke="#3C2A21" stroke-width="16"/>
        <!-- Dizzy Spiral Pupil -->
        <path d="M -15 0 C -15 -20, 15 -20, 15 0 C 15 15, -5 15, -5 0 Q -5 -5 0 -5" stroke="#3C2A21" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Eyelid drooping -->
        <path d="M -45 -10 Q 0 -30 45 -10 L 45 -45 L -45 -45 Z" fill="#FF9AA2"/>
        <path d="M -45 -10 Q 0 -30 45 -10" stroke="#3C2A21" stroke-width="16" stroke-linecap="round"/>
      </g>
      
      <!-- Dazed Mouth with Drool -->
      <g id="Mouth" transform="translate(320, 360)">
        <!-- Open wobbly mouth -->
        <path d="M -50 0 Q 0 40 50 0 Q 30 -20 0 -20 Q -30 -20 -50 0 Z" fill="#803D3D" stroke="#3C2A21" stroke-width="16" stroke-linejoin="round"/>
        <!-- Drool drip -->
        <path d="M -20 20 C -25 40, -10 50, -5 50 C 0 50, 5 40, 0 20 Z" fill="#B5EAD7" stroke="#3C2A21" stroke-width="12" stroke-linejoin="round"/>
      </g>
      
      <!-- Cute Blushing Cheeks -->
      <ellipse cx="120" cy="320" rx="30" ry="15" fill="#FFB7B2" opacity="0.6"/>
      <ellipse cx="520" cy="320" rx="30" ry="15" fill="#FFB7B2" opacity="0.6"/>
    </g>
  </g>
</svg>
